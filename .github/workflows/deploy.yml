name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff linter
        run: ruff check . --select E,F --ignore E501

      - name: Syntax check all Python files
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./dashboard/*" \
            -exec python -m py_compile {} \;
          echo "✅ All Python files passed syntax check"

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: officegangbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q
        env:
          # Service containers — integration tests use these; pure unit tests
          # ignore them. Locally (no env) the integration tests skip themselves.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/officegangbot_test
          REDIS_URL: redis://localhost:6379

  changes:
    name: Detect bot-code changes
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        # Only the bot runtime should redeploy Railway. Dashboard-only,
        # test-only, docs and workflow changes must NOT restart the bot
        # (rapid dashboard merges previously churned the deploy and took the
        # bot offline).
        run: |
          if git diff --name-only HEAD^ HEAD \
              | grep -qE '^(bot|main|api_server|config)\.py$|^(cogs|core|scripts)/|^requirements\.txt$'; then
            echo "bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "bot=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [lint, test, changes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.bot == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        # `up` uploads and builds the freshly checked-out commit, so the bot
        # always deploys the latest main. `redeploy` only re-ran the previous
        # deployment, which could leave the bot on stale code.
        #
        # `--detach` returns once the build is uploaded/triggered instead of
        # streaming build logs. The log stream is flaky ("Failed to stream build
        # logs") and made the step exit 1 even when the build succeeded, so every
        # deploy showed red. With --detach the step reflects the upload, not the
        # log stream. (Trade-off: a later build failure isn't surfaced here —
        # check the Railway dashboard if a deploy doesn't take effect.)
        run: railway up --service officegangbot --ci --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}