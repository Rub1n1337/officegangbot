version: '3.8'

services:
  bot:
    build: .
    container_name: officegangbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: officegangbot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"